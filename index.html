<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
<div class="container">
    <div class="calculator">

        <div class="brand-row">
            <span class="screw" aria-hidden="true"></span>
            <span class="brand">ELECTRO&nbsp;100</span>
            <span class="screw" aria-hidden="true"></span>
        </div>

        <div class="display-panel">
            <span class="power-dot" aria-hidden="true"></span>
            <input type="text" placeholder="0" id="inputBox" readonly>
        </div>

        <div>
            <button class="operator" data-action="clear">AC</button>
            <button data-value="7">7</button>
            <button data-value="4">4</button>
            <button data-value="1">1</button>
            <button class="operator" data-value=".">.</button>
        </div>
        <div>
            <button class="operator" data-action="delete">DEL</button>
            <button data-value="8">8</button>
            <button data-value="5">5</button>
            <button data-value="2">2</button>
            <button data-value="0">0</button>
        </div>
        <div>
            <button class="operator" data-value="%">%</button>
            <button data-value="9">9</button>
            <button data-value="6">6</button>
            <button data-value="3">3</button>
            <button data-value="00">00</button>
        </div>
        <div>
            <button class="operator" data-value="/">/</button>
            <button class="operator" data-value="*">*</button>
            <button class="operator" data-value="-">-</button>
            <button class="operator" data-value="+">+</button>
            <button class="equal" data-action="equals">=</button>
        </div>

        <div class="screw-row">
            <span class="screw" aria-hidden="true"></span>
            <span class="screw" aria-hidden="true"></span>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
