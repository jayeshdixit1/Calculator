<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
<div class="container">
    <div class="calculator">

        <div class="display-panel">
            <div class="trace" id="trace">&nbsp;</div>
            <input type="text" placeholder="0" id="inputBox" readonly aria-label="Calculator display">
        </div>

        <div class="keys keys-fn">
            <button class="fn" data-insert="sin(">sin</button>
            <button class="fn" data-insert="cos(">cos</button>
            <button class="fn" data-insert="tan(">tan</button>
            <button class="fn" data-insert="√(">√</button>
            <button class="fn" data-insert="^">xʸ</button>
            <button class="fn" data-insert="ln(">ln</button>
            <button class="fn" data-insert="log(">log</button>
            <button class="fn" data-insert="π">π</button>
            <button class="fn" data-insert="e">e</button>
            <button class="fn" data-insert="1/(">1/x</button>
        </div>

        <div class="keys keys-main">
            <button class="util" data-action="clear">AC</button>
            <button class="util" data-insert="(">(</button>
            <button class="util" data-insert=")">)</button>
            <button class="op" data-insert="%">%</button>

            <button class="digit" data-insert="7">7</button>
            <button class="digit" data-insert="8">8</button>
            <button class="digit" data-insert="9">9</button>
            <button class="op" data-insert="/">÷</button>

            <button class="digit" data-insert="4">4</button>
            <button class="digit" data-insert="5">5</button>
            <button class="digit" data-insert="6">6</button>
            <button class="op" data-insert="*">×</button>

            <button class="digit" data-insert="1">1</button>
            <button class="digit" data-insert="2">2</button>
            <button class="digit" data-insert="3">3</button>
            <button class="op" data-insert="-">−</button>

            <button class="util" data-action="delete">DEL</button>
            <button class="digit" data-insert="0">0</button>
            <button class="digit" data-insert=".">.</button>
            <button class="op" data-insert="+">+</button>

            <button class="equal" data-action="equals">=</button>
        </div>

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
